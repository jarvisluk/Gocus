<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1500" viewBox="0 0 1800 1500" role="img" aria-label="Git Peek icon concept board">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#354256" flood-opacity="0.18"/>
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#354256" flood-opacity="0.12"/>
    </filter>
    <filter id="smallShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#354256" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="tileLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.62" stop-color="#F4F7FA"/>
      <stop offset="1" stop-color="#DCE5EF"/>
    </linearGradient>
    <linearGradient id="tileCool" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FDFEFF"/>
      <stop offset="1" stop-color="#EAF1F7"/>
    </linearGradient>
    <linearGradient id="lineStack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0A400"/>
      <stop offset="0.38" stop-color="#25B7BA"/>
      <stop offset="0.68" stop-color="#48AD62"/>
      <stop offset="1" stop-color="#9B66E8"/>
    </linearGradient>
    <pattern id="dotGrid" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#7B8796" opacity="0.18"/>
    </pattern>
    <style>
      .board-bg { fill: #F4F7FA; }
      .title { fill: #1E242E; font: 700 44px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .subtitle { fill: #66707D; font: 500 23px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .section { fill: #1E242E; font: 700 26px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .label { fill: #1E242E; font: 700 23px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .note { fill: #66707D; font: 500 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .card { fill: #FFFFFF; stroke: rgba(30,36,46,0.09); stroke-width: 1.5; }
      .tile { fill: url(#tileLight); filter: url(#softShadow); }
      .tile2 { fill: url(#tileCool); filter: url(#softShadow); }
      .panel { fill: rgba(255,255,255,0.86); stroke: rgba(30,36,46,0.13); stroke-width: 3; }
      .hair { stroke: #D8DEE7; stroke-width: 3; stroke-linecap: round; }
      .textDark { fill: #202630; }
      .muted { fill: #8B95A3; }
      .orange { stroke: #F0A400; fill: none; }
      .teal { stroke: #25B7BA; fill: none; }
      .green { stroke: #48AD62; fill: none; }
      .purple { stroke: #9B66E8; fill: none; }
      .orangeFill { fill: #F0A400; }
      .tealFill { fill: #25B7BA; }
      .greenFill { fill: #48AD62; }
      .purpleFill { fill: #9B66E8; }
      .nodeWhite { fill: #FFFFFF; stroke-width: 7; }
      .monoLine { stroke: #1E242E; stroke-width: 15; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .monoDot { fill: #1E242E; }
      .trayLine { stroke: #111820; stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .trayDot { fill: #111820; }
      .trayWhite { stroke: #FFFFFF; fill: none; }
      .trayWhiteDot { fill: #FFFFFF; }
    </style>
  </defs>

  <rect class="board-bg" width="1800" height="1500"/>
  <text class="title" x="80" y="92">Git Peek icon directions</text>
  <text class="subtitle" x="80" y="132">Simpler options based on the concept UI: floating white panel, vertical commit rail, amber main line, teal/green/purple branches.</text>

  <text class="section" x="80" y="198">App icon concepts</text>

  <g transform="translate(80 232)">
    <rect class="card" width="520" height="390" rx="24"/>
    <text class="label" x="28" y="46">A. UI rail</text>
    <text class="note" x="28" y="74">Closest to the side-panel screenshot.</text>
    <g transform="translate(152 108)">
      <rect class="tile" width="220" height="220" rx="48"/>
      <rect x="39" y="30" width="142" height="160" rx="24" fill="#FFFFFF" stroke="#D9E0EA" stroke-width="3" filter="url(#smallShadow)"/>
      <rect x="39" y="76" width="142" height="1.5" fill="#D8DEE7"/>
      <rect x="54" y="46" width="24" height="18" rx="4" fill="#FDF6E5" stroke="#F0A400" stroke-width="2"/>
      <rect x="94" y="42" width="54" height="27" rx="14" fill="#FFFFFF" stroke="#DFE5EC" stroke-width="2"/>
      <circle cx="106" cy="55" r="3.2" fill="#F0A400"/>
      <path d="M106 55v-9m0 9l8 7" stroke="#F0A400" stroke-width="2.3" stroke-linecap="round"/>
      <rect x="52" y="94" width="22" height="108" fill="url(#dotGrid)" opacity="0.55"/>
      <path d="M65 100v92" stroke="url(#lineStack)" stroke-width="7" stroke-linecap="round"/>
      <circle class="nodeWhite orange" cx="65" cy="100" r="11"/>
      <circle class="nodeWhite teal" cx="65" cy="136" r="11"/>
      <circle class="nodeWhite green" cx="65" cy="171" r="11"/>
      <circle class="nodeWhite purple" cx="65" cy="192" r="11"/>
      <path class="hair" d="M98 104h78M98 136h68M98 171h78"/>
    </g>
  </g>

  <g transform="translate(650 232)">
    <rect class="card" width="520" height="390" rx="24"/>
    <text class="label" x="28" y="46">B. Floating peek</text>
    <text class="note" x="28" y="74">Keeps the code-backdrop plus panel idea.</text>
    <g transform="translate(152 108)">
      <rect class="tile2" width="220" height="220" rx="48"/>
      <g opacity="0.36">
        <rect x="21" y="44" width="104" height="14" rx="4" fill="#E3E9F1"/>
        <rect x="21" y="73" width="128" height="10" rx="4" fill="#CFD8E4"/>
        <rect x="35" y="96" width="91" height="10" rx="4" fill="#D8B5E9"/>
        <rect x="35" y="122" width="119" height="10" rx="4" fill="#9FD9D8"/>
        <rect x="21" y="151" width="136" height="10" rx="4" fill="#CFD8E4"/>
      </g>
      <rect x="74" y="25" width="136" height="178" rx="25" fill="#FFFFFF" stroke="#D9E0EA" stroke-width="3" filter="url(#smallShadow)"/>
      <path d="M96 72v112" stroke="url(#lineStack)" stroke-width="7" stroke-linecap="round"/>
      <circle class="nodeWhite orange" cx="96" cy="72" r="11"/>
      <circle class="nodeWhite teal" cx="96" cy="116" r="11"/>
      <circle class="nodeWhite green" cx="96" cy="160" r="11"/>
      <path class="hair" d="M122 72h66M122 116h58M122 160h65"/>
      <rect x="122" y="173" width="64" height="20" rx="10" fill="#FDF0BE"/>
    </g>
  </g>

  <g transform="translate(1220 232)">
    <rect class="card" width="520" height="390" rx="24"/>
    <text class="label" x="28" y="46">C. Commit knot</text>
    <text class="note" x="28" y="74">More iconic, less literal UI.</text>
    <g transform="translate(152 108)">
      <rect class="tile" width="220" height="220" rx="48"/>
      <path d="M66 58v104" stroke="#F0A400" stroke-width="14" stroke-linecap="round"/>
      <path d="M66 96c39 0 36-42 79-42h25" stroke="#25B7BA" stroke-width="14" stroke-linecap="round"/>
      <path d="M66 128c40 0 38 43 84 43h30" stroke="#48AD62" stroke-width="14" stroke-linecap="round"/>
      <path d="M66 162c43 0 47-69 104-69" stroke="#9B66E8" stroke-width="14" stroke-linecap="round"/>
      <circle cx="66" cy="58" r="20" fill="#FFFFFF" stroke="#F0A400" stroke-width="8"/>
      <circle cx="66" cy="128" r="20" fill="#FFFFFF" stroke="#F0A400" stroke-width="8"/>
      <circle cx="66" cy="162" r="20" fill="#FFFFFF" stroke="#F0A400" stroke-width="8"/>
      <circle cx="170" cy="54" r="20" fill="#FFFFFF" stroke="#25B7BA" stroke-width="8"/>
      <circle cx="180" cy="171" r="20" fill="#FFFFFF" stroke="#48AD62" stroke-width="8"/>
      <circle cx="170" cy="93" r="20" fill="#FFFFFF" stroke="#9B66E8" stroke-width="8"/>
    </g>
  </g>

  <g transform="translate(80 672)">
    <rect class="card" width="520" height="390" rx="24"/>
    <text class="label" x="28" y="46">D. Status chips</text>
    <text class="note" x="28" y="74">App-as-widget, but still simplified.</text>
    <g transform="translate(152 108)">
      <rect class="tile2" width="220" height="220" rx="48"/>
      <rect x="34" y="39" width="152" height="142" rx="25" fill="#FFFFFF" stroke="#D9E0EA" stroke-width="3" filter="url(#smallShadow)"/>
      <path d="M34 78h152" stroke="#E1E6ED" stroke-width="2"/>
      <path d="M61 101v51" stroke="#F0A400" stroke-width="6" stroke-linecap="round"/>
      <circle cx="61" cy="101" r="10" fill="#FFFFFF" stroke="#F0A400" stroke-width="5"/>
      <circle cx="61" cy="127" r="10" fill="#FFFFFF" stroke="#25B7BA" stroke-width="5"/>
      <circle cx="61" cy="152" r="10" fill="#FFFFFF" stroke="#48AD62" stroke-width="5"/>
      <rect x="86" y="96" width="84" height="17" rx="8.5" fill="#FDF0BE"/>
      <rect x="86" y="123" width="68" height="17" rx="8.5" fill="#DFF8F8"/>
      <rect x="86" y="150" width="76" height="17" rx="8.5" fill="#E3F6E8"/>
      <path d="M57 58h23" stroke="#F0A400" stroke-width="4" stroke-linecap="round"/>
      <rect x="104" y="49" width="48" height="26" rx="13" fill="#FFFFFF" stroke="#DFE5EC" stroke-width="2"/>
      <path d="M122 58v9m0-9l7-4m-7 13l7 4" stroke="#F0A400" stroke-width="2.3" stroke-linecap="round"/>
    </g>
  </g>

  <g transform="translate(650 672)">
    <rect class="card" width="520" height="390" rx="24"/>
    <text class="label" x="28" y="46">E. Folded peek</text>
    <text class="note" x="28" y="74">Quiet, document-like, macOS friendly.</text>
    <g transform="translate(152 108)">
      <rect class="tile" width="220" height="220" rx="48"/>
      <rect x="50" y="30" width="132" height="162" rx="24" fill="#FFFFFF" stroke="#D9E0EA" stroke-width="3" filter="url(#smallShadow)"/>
      <path d="M144 192c28-13 45-34 54-65 7 36 2 68-16 96-16-5-30-12-38-31Z" fill="#E2E8F0"/>
      <path d="M75 62v97" stroke="url(#lineStack)" stroke-width="8" stroke-linecap="round"/>
      <circle cx="75" cy="62" r="12" fill="#FFFFFF" stroke="#F0A400" stroke-width="6"/>
      <circle cx="75" cy="111" r="12" fill="#FFFFFF" stroke="#25B7BA" stroke-width="6"/>
      <circle cx="75" cy="159" r="12" fill="#FFFFFF" stroke="#48AD62" stroke-width="6"/>
      <path class="hair" d="M104 63h56M104 111h48M104 159h40"/>
    </g>
  </g>

  <g transform="translate(1220 672)">
    <rect class="card" width="520" height="390" rx="24"/>
    <text class="label" x="28" y="46">F. Mono mark</text>
    <text class="note" x="28" y="74">Most brand-like, best at small sizes.</text>
    <g transform="translate(152 108)">
      <rect class="tile2" width="220" height="220" rx="48"/>
      <rect x="49" y="42" width="122" height="136" rx="24" fill="#FFFFFF" stroke="#DCE2EA" stroke-width="3" filter="url(#smallShadow)"/>
      <path class="monoLine" d="M82 62v96"/>
      <path class="monoLine" d="M82 109h32c32 0 47-18 47-47"/>
      <path class="monoLine" d="M82 109h35c32 0 45 18 45 47"/>
      <circle class="orangeFill" cx="82" cy="62" r="14"/>
      <circle class="monoDot" cx="82" cy="109" r="14"/>
      <circle class="monoDot" cx="82" cy="158" r="14"/>
      <circle class="monoDot" cx="161" cy="62" r="14"/>
      <circle class="monoDot" cx="162" cy="156" r="14"/>
    </g>
  </g>

  <text class="section" x="80" y="1138">Menu bar template icon concepts</text>
  <text class="subtitle" x="80" y="1172">These are monochrome template marks. In macOS they should invert automatically for light and dark menu bars.</text>

  <g transform="translate(80 1210)">
    <rect class="card" width="270" height="210" rx="22"/>
    <rect x="34" y="30" width="202" height="44" rx="14" fill="#F9FAFC" stroke="#DCE2EA"/>
    <g transform="translate(56 42) scale(0.58)">
      <path class="trayLine" d="M15 4v42"/>
      <path class="trayLine" d="M15 24h22c18 0 30-12 30-30"/>
      <path class="trayLine" d="M15 24h22c18 0 30 12 30 30"/>
      <circle class="trayDot" cx="15" cy="4" r="8"/>
      <circle class="trayDot" cx="15" cy="24" r="8"/>
      <circle class="trayDot" cx="15" cy="46" r="8"/>
      <circle class="trayDot" cx="67" cy="-6" r="8"/>
      <circle class="trayDot" cx="67" cy="54" r="8"/>
    </g>
    <rect x="34" y="92" width="202" height="44" rx="14" fill="#15191F"/>
    <g transform="translate(56 104) scale(0.58)">
      <path class="trayLine trayWhite" d="M15 4v42"/>
      <path class="trayLine trayWhite" d="M15 24h22c18 0 30-12 30-30"/>
      <path class="trayLine trayWhite" d="M15 24h22c18 0 30 12 30 30"/>
      <circle class="trayWhiteDot" cx="15" cy="4" r="8"/>
      <circle class="trayWhiteDot" cx="15" cy="24" r="8"/>
      <circle class="trayWhiteDot" cx="15" cy="46" r="8"/>
      <circle class="trayWhiteDot" cx="67" cy="-6" r="8"/>
      <circle class="trayWhiteDot" cx="67" cy="54" r="8"/>
    </g>
    <text class="label" x="34" y="174">1. Branch Y</text>
  </g>

  <g transform="translate(380 1210)">
    <rect class="card" width="270" height="210" rx="22"/>
    <rect x="34" y="30" width="202" height="44" rx="14" fill="#F9FAFC" stroke="#DCE2EA"/>
    <g transform="translate(70 41) scale(0.62)">
      <path class="trayLine" d="M10 3v46"/>
      <circle class="trayDot" cx="10" cy="3" r="8"/>
      <circle class="trayDot" cx="10" cy="25" r="8"/>
      <circle class="trayDot" cx="10" cy="49" r="8"/>
      <path class="trayLine" d="M34 7h36M34 25h48M34 49h34"/>
    </g>
    <rect x="34" y="92" width="202" height="44" rx="14" fill="#15191F"/>
    <g transform="translate(70 103) scale(0.62)">
      <path class="trayLine trayWhite" d="M10 3v46"/>
      <circle class="trayWhiteDot" cx="10" cy="3" r="8"/>
      <circle class="trayWhiteDot" cx="10" cy="25" r="8"/>
      <circle class="trayWhiteDot" cx="10" cy="49" r="8"/>
      <path class="trayLine trayWhite" d="M34 7h36M34 25h48M34 49h34"/>
    </g>
    <text class="label" x="34" y="174">2. Commit rail</text>
  </g>

  <g transform="translate(680 1210)">
    <rect class="card" width="270" height="210" rx="22"/>
    <rect x="34" y="30" width="202" height="44" rx="14" fill="#F9FAFC" stroke="#DCE2EA"/>
    <g transform="translate(74 42) scale(0.6)">
      <path class="trayLine" d="M6 8h22v14H14v20h22"/>
      <path class="trayLine" d="M58 6v44"/>
      <path class="trayLine" d="M58 28h24"/>
      <circle class="trayDot" cx="58" cy="6" r="7"/>
      <circle class="trayDot" cx="58" cy="50" r="7"/>
      <circle class="trayDot" cx="82" cy="28" r="7"/>
    </g>
    <rect x="34" y="92" width="202" height="44" rx="14" fill="#15191F"/>
    <g transform="translate(74 104) scale(0.6)">
      <path class="trayLine trayWhite" d="M6 8h22v14H14v20h22"/>
      <path class="trayLine trayWhite" d="M58 6v44"/>
      <path class="trayLine trayWhite" d="M58 28h24"/>
      <circle class="trayWhiteDot" cx="58" cy="6" r="7"/>
      <circle class="trayWhiteDot" cx="58" cy="50" r="7"/>
      <circle class="trayWhiteDot" cx="82" cy="28" r="7"/>
    </g>
    <text class="label" x="34" y="174">3. Peek rail</text>
  </g>

  <g transform="translate(980 1210)">
    <rect class="card" width="270" height="210" rx="22"/>
    <rect x="34" y="30" width="202" height="44" rx="14" fill="#F9FAFC" stroke="#DCE2EA"/>
    <g transform="translate(78 41) scale(0.62)">
      <rect x="0" y="0" width="56" height="56" rx="13" fill="none" stroke="#111820" stroke-width="7"/>
      <path class="trayLine" d="M20 11v34M20 28h20"/>
      <circle class="trayDot" cx="20" cy="11" r="6"/>
      <circle class="trayDot" cx="20" cy="45" r="6"/>
      <circle class="trayDot" cx="40" cy="28" r="6"/>
    </g>
    <rect x="34" y="92" width="202" height="44" rx="14" fill="#15191F"/>
    <g transform="translate(78 103) scale(0.62)">
      <rect x="0" y="0" width="56" height="56" rx="13" fill="none" stroke="#FFFFFF" stroke-width="7"/>
      <path class="trayLine trayWhite" d="M20 11v34M20 28h20"/>
      <circle class="trayWhiteDot" cx="20" cy="11" r="6"/>
      <circle class="trayWhiteDot" cx="20" cy="45" r="6"/>
      <circle class="trayWhiteDot" cx="40" cy="28" r="6"/>
    </g>
    <text class="label" x="34" y="174">4. Window node</text>
  </g>

  <g transform="translate(1280 1210)">
    <rect class="card" width="270" height="210" rx="22"/>
    <rect x="34" y="30" width="202" height="44" rx="14" fill="#F9FAFC" stroke="#DCE2EA"/>
    <g transform="translate(75 42) scale(0.62)">
      <path class="trayLine" d="M10 48L42 12"/>
      <path class="trayLine" d="M42 12h44"/>
      <path class="trayLine" d="M42 12v44"/>
      <circle class="trayDot" cx="10" cy="48" r="8"/>
      <circle class="trayDot" cx="42" cy="12" r="8"/>
      <circle class="trayDot" cx="86" cy="12" r="8"/>
      <circle class="trayDot" cx="42" cy="56" r="8"/>
    </g>
    <rect x="34" y="92" width="202" height="44" rx="14" fill="#15191F"/>
    <g transform="translate(75 104) scale(0.62)">
      <path class="trayLine trayWhite" d="M10 48L42 12"/>
      <path class="trayLine trayWhite" d="M42 12h44"/>
      <path class="trayLine trayWhite" d="M42 12v44"/>
      <circle class="trayWhiteDot" cx="10" cy="48" r="8"/>
      <circle class="trayWhiteDot" cx="42" cy="12" r="8"/>
      <circle class="trayWhiteDot" cx="86" cy="12" r="8"/>
      <circle class="trayWhiteDot" cx="42" cy="56" r="8"/>
    </g>
    <text class="label" x="34" y="174">5. Graph fork</text>
  </g>

  <g transform="translate(1580 1210)">
    <rect class="card" width="140" height="210" rx="22"/>
    <rect x="24" y="30" width="92" height="44" rx="14" fill="#F9FAFC" stroke="#DCE2EA"/>
    <g transform="translate(45 43) scale(0.58)">
      <path class="trayLine" d="M7 8h28v16H19v18h28"/>
      <circle class="trayDot" cx="7" cy="8" r="6"/>
      <circle class="trayDot" cx="47" cy="42" r="6"/>
    </g>
    <rect x="24" y="92" width="92" height="44" rx="14" fill="#15191F"/>
    <g transform="translate(45 105) scale(0.58)">
      <path class="trayLine trayWhite" d="M7 8h28v16H19v18h28"/>
      <circle class="trayWhiteDot" cx="7" cy="8" r="6"/>
      <circle class="trayWhiteDot" cx="47" cy="42" r="6"/>
    </g>
    <text class="label" x="24" y="174">6. Peek</text>
  </g>
</svg>
